<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrative Contact Desk | Innovate 2K26</title>
    <!-- Industry Standard Premium Fonts & Icons Infrastructure -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --dark-bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.45);
            --text-light: #f9fafb;
            --text-muted: #9ca3af;
            --body-bg: var(--dark-bg);
            --content-text: var(--text-light);
            --border-color: rgba(255, 255, 255, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.6);
            --blur-effect: blur(16px);
            --glow-color: rgba(66, 133, 244, 0.25);
            
            --orb-blue: rgba(66, 133, 244, 0.3);
            --orb-red: rgba(234, 67, 53, 0.25);
            --orb-blur: 130px;
            --container-glow: none;
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-text: #ffffff;
        }

        /* --- Ultra-Premium Light Mode with 80% Visibility Deep Corporate Color Wave --- */
        body.light-grid-theme {
            --body-bg: #e2e8f0;
            --content-text: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.88);
            --text-muted: #334155;
            --border-color: rgba(66, 133, 244, 0.4);
            --card-shadow: rgba(15, 23, 42, 0.1);
            --glow-color: rgba(66, 133, 244, 0.35);
            --input-bg: rgba(0, 0, 0, 0.02);
            --input-text: #0f172a;
            
            --orb-blue: rgba(66, 133, 244, 0.35);
            --orb-red: rgba(234, 67, 53, 0.28);
            --orb-blur: 100px;
            
            /* High-Intensity Royal Blue Glow and Sparks to lift containers */
            --container-glow: 0 15px 35px rgba(66, 133, 244, 0.22), 0 0 25px rgba(66, 133, 244, 0.15);
            
            /* 80% Strong Industrial Darker Gradient Colors for Background Animation */
            background: linear-gradient(135deg, #cbd5e1, #bfdbfe, #fecaca, #fef08a, #bbf7d0);
            background-size: 400% 400%;
            animation: gradientWave 15s ease infinite;
        }

        /* Technical Blueprint Notebook layout over the moving background */
        body.light-grid-theme::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background-image: 
                linear-gradient(rgba(66, 133, 244, 0.06) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(66, 133, 244, 0.06) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--body-bg);
            color: var(--content-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: 60px 20px;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        /* --- Dynamic Background Lights (Active in Dark Mode) --- */
        .google-orb {
            position: absolute; border-radius: 50%; z-index: -2; filter: blur(var(--orb-blur)); pointer-events: none;
        }
        .orb-1 { background-color: var(--orb-blue); width: 600px; height: 600px; top: -10%; left: -10%; }
        .orb-2 { background-color: var(--orb-red); width: 500px; height: 500px; bottom: -10%; right: -10%; }

        /* --- Floating Adaptive Theme Switcher --- */
        .theme-toggle-btn {
            position: absolute; top: 35px; right: 6%; background-color: var(--card-bg); backdrop-filter: var(--blur-effect); -webkit-backdrop-filter: var(--blur-effect); border: 2px solid var(--google-blue); padding: 14px; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 30px var(--card-shadow); display: flex; align-items: center; justify-content: center; width: 56px; height: 56px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .theme-toggle-btn:hover { transform: scale(1.1) rotate(12deg); }
        .theme-toggle-btn .fa-sun { color: var(--google-yellow); display: none; }
        .theme-toggle-btn .fa-moon { color: var(--google-blue); display: block; }
        body.light-grid-theme .theme-toggle-btn .fa-sun { display: block; }
        body.light-grid-theme .theme-toggle-btn .fa-moon { display: none; }
        body.light-grid-theme .theme-toggle-btn { border-color: #1e40af; }

        /* --- Back Button --- */
        .btn-back {
            position: absolute; top: 35px; left: 6%; display: inline-flex; align-items: center; gap: 8px; color: var(--content-text); text-decoration: none; font-weight: 600; font-size: 0.95rem; padding: 12px 24px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 30px; backdrop-filter: var(--blur-effect); transition: 0.3s;
        }
        .btn-back:hover { border-color: var(--google-blue); transform: translateX(-4px); }

        /* --- Contact Container Layout --- */
        .contact-master-wrapper {
            max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1.3fr; gap: 50px; margin-top: 40px;
        }

        .contact-info-panel, .contact-form-panel {
            background-color: var(--card-bg); backdrop-filter: var(--blur-effect); -webkit-backdrop-filter: var(--blur-effect); border: 1px solid var(--border-color); box-shadow: var(--container-glow), 0 20px 40px var(--card-shadow); border-radius: 32px; padding: 45px; transition: background-color 0.3s, box-shadow 0.3s;
        }

        .contact-info-panel h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
        .contact-info-panel p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 35px; }

        .desk-meta-item { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 30px; }
        .desk-meta-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(66, 133, 244, 0.1); border: 1px solid rgba(66, 133, 244, 0.2); display: flex; align-items: center; justify-content: center; color: var(--google-blue); font-size: 1.2rem; shrink: 0; }
        .desk-meta-text h5 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        .desk-meta-text p { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 0; }

        .contact-form-panel h3 { font-size: 1.6rem; font-weight: 700; margin-bottom: 25px; }
        .form-grid-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .input-node-wrapper { display: flex; flex-direction: column; gap: 8px; }
        .input-node-wrapper label { font-size: 0.85rem; font-weight: 600; color: var(--content-text); }
        
        .form-input-field {
            background-color: var(--input-bg); border: 1px solid var(--border-color); color: var(--input-text); padding: 14px 20px; border-radius: 14px; font-size: 0.92rem; outline: none; transition: 0.3s; width: 100%;
        }
        .form-input-field:focus { border-color: var(--google-blue); box-shadow: 0 0 10px rgba(66, 133, 244, 0.2); }
        textarea.form-input-field { resize: none; height: 140px; }

        .btn-submit-desk {
            background: linear-gradient(135deg, var(--google-blue), #1e40af); color: #ffffff; padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 1rem; transition: 0.3s; border: none; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 8px 24px rgba(66, 133, 244, 0.4); cursor: pointer; margin-top: 10px; width: 100%; justify-content: center;
        }
        .btn-submit-desk:hover { transform: translateY(-2px); box-shadow: 0 15px 32px rgba(66, 133, 244, 0.5); }

        @media (max-width: 968px) {
            .contact-master-wrapper { grid-template-columns: 1fr; gap: 30px; }
            body { padding-top: 120px; }
        }
        @media (max-width: 600px) {
            .form-grid-group { grid-template-columns: 1fr; }
            h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Mesh Background Orbs (Active in Dark mode) -->
    <div class="google-orb orb-1"></div>
    <div class="google-orb orb-2"></div>

    <!-- Top Navigation Controls -->
    <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Back to Home</a>
    
    <button class="theme-toggle-btn" onclick="togglePageTheme()" title="Switch Layout Environment">
        <i class="fas fa-moon"></i><i class="fas fa-sun"></i>
    </button>

    <!-- Contact Dashboard Content Matrix -->
    <div class="contact-master-wrapper">
        
        <!-- Info Column Grid Widget -->
        <div class="contact-info-panel">
            <h2>Get in Touch 🌐</h2>
            <p>For any queries regarding event management, technical issues, or overall coordination, connect directly with our Organizer.</p>
            
            <div class="desk-meta-cluster">
                <div class="desk-meta-item">
                    <div class="desk-meta-icon"><i class="fas fa-envelope"></i></div>
                    <div class="desk-meta-text">
                        <h5>Email</h5>
                        <p>amolemail01@gmail.com</p>
                    </div>
                </div>
                <div class="desk-meta-item">
                    <div class="desk-meta-icon"><i class="fas fa-headset"></i></div>
                    <div class="desk-meta-text">
                        <h5>Contact</h5>
                        <p>+91 8669750625 (Amol Patil)</p>
                    </div>
                </div>
                <div class="desk-meta-item">
                    <div class="desk-meta-icon"><i class="fas fa-building"></i></div>
                    <div class="desk-meta-text">
                        <h5>Operational Hub Location</h5>
                        <p>Kolhapur</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form Dispatch Input Panel with Your Formspree Endpoint Link -->
        <div class="contact-form-panel">
            <h3>Send a Message ✉️</h3>
            <form action="https://formspree.io/f/mrewqdgr" method="POST">
                <div class="form-grid-group">
                    <div class="input-node-wrapper">
                        <label for="user-name">Full Name</label>
                        <input type="text" id="user-name" name="name" class="form-input-field" placeholder="Enter name" required>
                    </div>
                    <div class="input-node-wrapper">
                        <label for="user-email">Email Address</label>
                        <input type="email" id="user-email" name="_replyto" class="form-input-field" placeholder="Enter email" required>
                    </div>
                </div>
                
                <div class="input-node-wrapper" style="margin-bottom: 20px;">
                    <label for="msg-subject">Subject Context</label>
                    <input type="text" id="msg-subject" name="subject" class="form-input-field" placeholder="What is this regarding?" required>
                </div>

                <div class="input-node-wrapper" style="margin-bottom: 25px;">
                    <label for="user-msg">Detailed Message</label>
                    <textarea id="user-msg" name="message" class="form-input-field" placeholder="Write message details here..." required></textarea>
                </div>

                <button type="submit" class="btn-submit-desk">
                    Dispatch Message <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>

    </div>

    <!-- Theme Transition Script Integration Engine -->
    <script>
        function togglePageTheme() {
            document.body.classList.toggle('light-grid-theme');
        }
    </script>
</body>
</html>
