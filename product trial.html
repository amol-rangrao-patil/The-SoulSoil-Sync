<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Trials | The SoulSoil Sync Presented by ADHYATMANTAN FARMS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');
        
        body { margin: 0; background: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; }
        
        /* Background Orbs Animation */
        .bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; }

        .container { max-width: 1000px; margin: 0 auto; }
        .main-grid { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }

        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        
        /* Proper Button Formatting */
        .sidebar-btn { display: block; width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; text-align: center; font-weight: 800; text-decoration: none; color: #fff; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-join { background: #4285F4; }
        .btn-prize { background: #FBBC05; color: #000; }
        .btn-task { background: #EA4335; }
        .sidebar-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .meta-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 0.9rem; }
        
        @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="orb" style="background:#4285F4; width:400px; height:400px; top:-10%; left:-10%;"></div>
        <div class="orb" style="background:#EA4335; width:350px; height:350px; bottom:-10%; right:-10%;"></div>
    </div>

    <div class="container">
        <!-- New Back to Home Button -->
        <a href="index.html" style="display: inline-block; padding: 10px 20px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; margin-bottom: 20px;" 
           onmouseover="this.style.borderColor='#4285F4'; this.style.color='#fff';" 
           onmouseout="this.style.borderColor='rgba(255, 255, 255, 0.2)'; this.style.color='#888';">← Back to Home</a>
        
        <div class="main-grid" style="margin-top: 10px;">
            <!-- Left Side: Content -->
            <div>
                <div class="card">
                    <h1>Live Demo & Hands-On</h1>
                    <p style="color: #bbb;">Expert-led technical session for top-tier candidates.</p>
                    <div class="meta-grid">
                        <div class="meta-item">📅 <b>Date:</b> TDB</div>
                        <div class="meta-item">📍 <b>Location:</b> TDB</div>
                        <div class="meta-item">👥 <b>Capacity:</b> 35 Seats</div>
                        <div class="meta-item">⚠️ <b>Rules:</b> Formal Attire</div>
                    </div>
                </div>

                <!-- Event Description (Moved Above Resources) -->
                <div class="card">
                    <h3>Event Description</h3>
                    <p style="color: #ccc; line-height: 1.8;">Updated Soon!!</p>
                </div>

                <!-- Session Resources -->
                <div class="card">
                    <h3>Session Resources</h3>
                    <div style="width:100%; height:400px; border-radius:15px; overflow:hidden;">
                        <iframe src="updated soon" style="width:100%; height:100%; border:none;"></iframe>
                    </div>
                </div>
            </div>

            <!-- Right Side: Quick Actions -->
            <div style="position: sticky; top: 40px; height: fit-content;">
                <div class="card">
                    <h3 style="margin-top:0;">Quick Actions</h3>
                    <a href="#" class="sidebar-btn btn-join">JOIN SESSION</a>
                    <a href="prizes.html" class="sidebar-btn btn-prize">VIEW PRIZES</a>
                    <a href="https://producttrialfeedback.geministudentambassador.com/" class="sidebar-btn btn-task">SUBMIT TASK</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
